<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | Hot Wheels Legends</title>
    <meta name="theme-color" content="#E31937" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --card: #1a1a1a;
        --red: #e31937;
        --orange: #ff6b00;
        --text: #fff;
        --muted: #a0a0a0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          repeating-linear-gradient(135deg, rgba(227, 25, 55, 0.08) 0 2px, transparent 2px 18px),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        background: rgba(26, 26, 26, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-left: 4px solid var(--red);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 12vw, 3.5rem);
        line-height: 0.95;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        background: linear-gradient(135deg, var(--red), var(--orange));
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Connect to the internet to browse the full Hot Wheels collection and sync your latest data.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
